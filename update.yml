---
- hosts: all
  become: true
  become_method: sudo
  gather_facts: false
  name: update.yml
  vars:
    telegram_token: "{{ lookup('env', 'TELEGRAM_TOKEN') }}"
    telegram_channel: "{{ lookup('env', 'TELEGRAM_CHANNEL') }}"
  tasks:
      - name: 0 Attempt Connection and Configuration
        block:
          - name: 0-1 Check host availability explicitly
            ansible.builtin.wait_for_connection:
              timeout: 20
            # CRITICAL: Forces connection errors to act like standard failures
            ignore_unreachable: true
  
          - name: 0-2 Gather facts once connection is confirmed
            ansible.builtin.setup:
  
          - name: 0-3 Run primary task
            ansible.builtin.command: echo "Connected successfully!"
        rescue:
          - name: 0F-1 Send failure alert to Telegram
            delegate_to: localhost
            become: false
            community.general.telegram:
              token: "{{ telegram_token }}"
              api_args:
                chat_id: "{{ telegram_channel }}"
                parse_mode: "markdown"
                text: |
                  🚨 *Playbook Failed!*
                  *Host:* {{ inventory_hostname }}
                  *Failed Task:* {{ ansible_failed_task.name }}
                  *Failed Playbook:* {{ ansible_play_name }}
                  *Failure Message:* Ansible failed to connect to host {{ inventory_hostname }}
                  
          - name: 0F-2 End playbook execution after alert
            delegate_to: localhost
            become: false
            ansible.builtin.fail:
              msg: "Playbook execution stopped due to a failure."

      - name: 1 Update all packages to their latest version
        block:
          - name: 1-0 Update all packages to their latest version
            ansible.builtin.apt:
              name: "*"
              state: latest
        rescue:
          - name: 1F-0 Send failure alert to Telegram
            community.general.telegram:
              token: "{{ telegram_token }}"
              api_args:
                chat_id: "{{ telegram_channel }}"
                parse_mode: "markdown"
                text: |
                  🚨 *Playbook Failed!*
                  *Host:* {{ inventory_hostname }}
                  *Failed Task:* {{ ansible_failed_task.name }}
                  *Failed Playbook:* {{ ansible_play_name }}
                  *Failure Message:* ```{{ ansible_failed_result }}```
          - name: 1F-1 End playbook execution after alert
            ansible.builtin.fail:
              msg: "Playbook execution stopped due to a failure."
        timeout: 300
          
      - name: 2 Run the equivalent of "apt-get update" as a separate step
        block:
          - name: 2-0 Run the equivalent of "apt-get update" as a separate step
            ansible.builtin.apt:
              update_cache: yes
        rescue:
          - name: 2F-0 Send failure alert to Telegram
            community.general.telegram:
              token: "{{ telegram_token }}"
              api_args:
                chat_id: "{{ telegram_channel }}"
                parse_mode: "markdown"
                text: |
                  🚨 *Playbook Failed!*
                  *Host:* {{ inventory_hostname }}
                  *Failed Task:* {{ ansible_failed_task.name }}
                  *Failed Playbook:* {{ ansible_play_name }}
                  *Failure Message:* ```{{ ansible_failed_result }}```
          - name: 2F-1 End playbook execution after alert
            ansible.builtin.fail:
              msg: "Playbook execution stopped due to a failure."
        timeout: 300
        
      - name: 3 Upgrade the OS (apt-get dist-upgrade)
        block:
          - name: 3-0 Upgrade the OS (apt-get dist-upgrade)
            ansible.builtin.apt:
              upgrade: dist
        rescue:
          - name: 3F-0 Send failure alert to Telegram
            community.general.telegram:
              token: "{{ telegram_token }}"
              api_args:
                chat_id: "{{ telegram_channel }}"
                parse_mode: "markdown"
                text: |
                  🚨 *Playbook Failed!*
                  *Host:* {{ inventory_hostname }}
                  *Failed Task:* {{ ansible_failed_task.name }}
                  *Failed Playbook:* {{ ansible_play_name }}
                  *Failure Message:* ```{{ ansible_failed_result }}```
          - name: 3F-1 End playbook execution after alert
            ansible.builtin.fail:
              msg: "Playbook execution stopped due to a failure."
        timeout: 300
