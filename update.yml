---
- hosts: all
  become: true
  become_method: sudo
  tasks:

    - name: Update all packages to their latest version
      ansible.builtin.apt:
        name: "*"
        state: latest
        
    - name: Run the equivalent of "apt-get update" as a separate step
      ansible.builtin.apt:
        update_cache: yes
      
    - name: Upgrade the OS (apt-get dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        
    - name: Reboot the machine (Wait for 5 min)
      reboot:
        reboot_timeout: 300
